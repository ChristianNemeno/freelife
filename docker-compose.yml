services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-freelifedb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdevpassword123}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend/FreeLife.API
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${POSTGRES_DB:-freelifedb};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-localdevpassword123}
      - Jwt__Key=${JWT_KEY:-super-secret-dev-key-at-least-32-characters-long!}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ASPNETCORE_URLS=http://+:8080
      - Logging__LogLevel__Microsoft.AspNetCore.Authentication=Debug
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
