services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    networks:
      - default
      - caddy_net

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-freelifedb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdevpassword123}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: ghcr.io/christiannemeno/freelife/frontend:latest
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      default:
      caddy_net:
        aliases:
          - freelife-frontend

  backend:
    image: ghcr.io/christiannemeno/freelife/backend:latest
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${POSTGRES_DB:-freelifedb};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-localdevpassword123}
      - Jwt__Key=${JWT_KEY:-super-secret-dev-key-at-least-32-characters-long!}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
      caddy_net:
        aliases:
          - freelife-backend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  default:
  caddy_net:
    external: true
